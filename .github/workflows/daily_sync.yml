name: Daily Registry Sync

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Sync Registry
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
        run: |
          poetry run python scripts/generate_registry.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions-bot"
          git config --global user.email "actions@github.com"
          git add data/openrouter_insights.sqlite openrouter_insights.json
          git commit -m "chore: automated daily registry update [skip ci]" || echo "No changes to commit"
          git push origin main
