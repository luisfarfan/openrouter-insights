[tool.poetry]
name = "llmindex"
version = "0.1.0"
description = "A unified, open-source LLM registry merging OpenRouter and ArtificialAnalysis."
authors = ["Antigravity Agent <agent@gemini.ai>"]
readme = "README.md"
packages = [{include = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.110.0"
uvicorn = "^0.27.1"
sqlmodel = "^0.0.16"
aiosqlite = "^0.19.0"
aiohttp = "^3.9.3"
pydantic-settings = "^2.2.1"
python-dotenv = "^1.0.1"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.2"
pytest-asyncio = "^0.23.5"
httpx = "^0.27.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
